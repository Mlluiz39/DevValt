services:
  redis:
    image: redis:7-alpine
    container_name: devvault_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-devvault_redis_2024} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-devvault_redis_2024}", "ping"]
    networks:
      - devvault_network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: devvault_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD:-devvault_redis_2024}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-9dK4$zWQm7!Lr2Xv@8pT5YcN3sA1uBfH6gJkR9eQ}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-H2xP8qV!7sD4Lk9@TzW3aYc6M1rN5uBfE0JgQp}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3001}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-8a9e2d5b6c7f3a1e4b9c2d8f0a6e1c3d5f7b9a2c4e6d8f1a3b5c7d9e0f2a4b6}
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - devvault_network
    command: npm run dev

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: devvault_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:5173}
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - devvault_network
    command: npm run dev

volumes:
  redis_data:
    driver: local

networks:
  devvault_network:
    driver: bridge
