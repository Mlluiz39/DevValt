version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: devvault_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devvault_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-devvault}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devvault}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devvault_network

  redis:
    image: redis:7-alpine
    container_name: devvault_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-devvault_redis_2024} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-devvault_redis_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devvault_network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: devvault_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-devvault}:${POSTGRES_PASSWORD:-devvault_secret_2024}@postgres:5432/${POSTGRES_DB:-devvault}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-devvault_redis_2024}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production_32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-change_this_to_32_byte_hex_string_in_prod}
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devvault_network
    command: npm run dev

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: devvault_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - devvault_network
    command: npm run dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  devvault_network:
    driver: bridge
