services:
  redis:
    image: redis:7-alpine
    container_name: devvault_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-devvault_redis_2024} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-devvault_redis_2024}", "ping"]
    networks:
      - devvault_network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: devvault_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      REDIS_URL: redis://:${REDIS_PASSWORD:-devvault_redis_2024}@redis:6379
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - devvault_network
    command: npm run dev

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: devvault_web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - devvault_network
    command: npm run dev

volumes:
  redis_data:
    driver: local

networks:
  devvault_network:
    driver: bridge
