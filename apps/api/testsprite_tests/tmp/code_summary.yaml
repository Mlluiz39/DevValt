version: "2"
type: backend
tech_stack:
  - TypeScript
  - Express
  - Prisma (PostgreSQL)
  - Redis
features:
  - name: Authentication
    description: User authentication and authorization
    endpoints:
      - method: POST
        path: /api/v1/auth/login
        description: Authenticate user
        auth_required: false
      - method: POST
        path: /api/v1/auth/register
        description: Register a new user
        auth_required: false
  - name: Users Management
    description: Manage user accounts and profiles
    endpoints:
      - method: GET
        path: /api/v1/users/me
        description: Get current user profile
        auth_required: true
  - name: Organizations Management
    description: Create and manage organizations that group projects and users
    endpoints:
      - method: GET
        path: /api/v1/organizations
        description: List organizations for the current user
        auth_required: true
      - method: POST
        path: /api/v1/organizations
        description: Create a new organization
        auth_required: true
  - name: Projects Management
    description: Projects within an organization that hold secrets
    endpoints:
      - method: GET
        path: /api/v1/organizations/:orgId/projects
        description: List projects within an organization
        auth_required: true
  - name: Secrets Management
    description: Secure storage and retrieval of API keys and secrets
    endpoints:
      - method: GET
        path: /api/v1/organizations/:orgId/projects/:projectId/secrets
        description: Get secrets for a specific project
        auth_required: true
  - name: Audit Logs
    description: Track activity and access logs for compliance
    endpoints:
      - method: GET
        path: /api/v1/organizations/:orgId/audit
        description: Retrieve organization audit logs
        auth_required: true
  - name: API Keys
    description: Manage programmatic access keys for organizations
    endpoints:
      - method: GET
        path: /api/v1/organizations/:orgId/api-keys
        description: List API keys for an organization
        auth_required: true
  - name: Plans
    description: Subscription and billing plans
    endpoints:
      - method: GET
        path: /api/v1/plans
        description: View available subscription plans
        auth_required: true
known_limitations: []
